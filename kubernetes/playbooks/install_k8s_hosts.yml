---
- name: Kubernetes Hosts Preparation
  hosts: k8s
  become: true

  tasks:
    - name: swap off
      become: true
      block:
        - name: set the current swap off
          command: swapoff -a
        - name: disable swap file in fstable so that it is not loaded at boot-time.
          lineinfile:
            dest: /etc/fstab
            regexp: '^/swap.img'
            line: "#/swap.img"
            state: present

    - name: "load modules: overlay and br_netfilter"
      become: true
      block:
        - shell:
            cmd: |
              cat <<EOF | tee /etc/modules-load.d/k8s.conf
              overlay
              br_netfilter
              EOF
        - command: modprobe overlay
        - command: modprobe br_netfilter

    - name: setup the ipv4 bridge
      become: true
      block:
        - copy:
            dest: /etc/sysctl.d/k8s.conf
            content: |
              net.bridge.bridge-nf-call-iptables = 1
              net.bridge.bridge-nf-call-ip6tables = 1
              net.ipv4.ip_forward = 1
        - command: sysctl --system

    - name: disable ufw
      become: true
      ufw: state=disabled

    - name: install kubernetes packages and hold them
      block:
        - name: Add Kubernetes gpg key
          apt_key:
            url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
            state: present
        - name: Add Kubernetes software repository
          apt_repository:
            repo: deb https://apt.kubernetes.io/ kubernetes-xenial main
            state: present
            filename: kubernetes.list
            update_cache: yes
        - name: Install kubernetes
          apt:
            name: [ 'kubelet', 'kubeadm', 'kubectl' ]
            state: present
            update_cache: yes

        - name: Hold kubelet package at current version
          dpkg_selections:
            name: "{{ item }}"
            selection: hold
          loop:
            - kubelet
            - kubeadm
            - kubectl
          notify: restart kubelet

  handlers:
    - name: restart kubelet
      systemd: name=kubelet state=restarted enabled=true