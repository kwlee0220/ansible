---
- name: Kafka Configuration Setup
  hosts: all
  become: yes
  vars:
    kafka_home: /opt/kafka
    seq: "{{groups.node.index(inventory_hostname) + 1}}"
    zookeepers: "{{ groups.node | join(':2181,') }}:2181"

  tasks:
    - name: update broker ID
      become_user: kafka
      replace:
        path: "{{ kafka_home }}/config/server.properties"
        regexp: 'broker.id=0'
        replace: 'broker.id={{ seq }}'

    - name: update listeners
      become_user: kafka
      replace:
        path: "{{ kafka_home }}/config/server.properties"
        regexp: '#listeners=PLAINTEXT://:9092'
        replace: 'listeners=PLAINTEXT://:9092'

    - name: update advertised listeners
      become_user: kafka
      replace:
        path: "{{ kafka_home }}/config/server.properties"
        regexp: '#advertised.+'
        replace: "advertised.listeners=PLAINTEXT://{{ ansible_default_ipv4.address }}:9092"

    - name: update zookeeper servers in kafka configuration
      become_user: kafka
      replace:
        path: "{{ kafka_home }}/config/server.properties"
        regexp: 'zookeeper.connect=.+'
        replace: "zookeeper.connect={{ zookeepers }}"

    - name: update zookeeper synclimit in kafka configuration
      become_user: kafka
      blockinfile:
        path: "{{ kafka_home }}/config/zookeeper.properties"
        marker: ""
        block: |
          initLimit=10
          syncLimit=5

    - name: update zookeeper in kafka configuration
      become_user: kafka
      blockinfile:
        path: "{{ kafka_home }}/config/zookeeper.properties"
        marker: ""
        block: |
          server.{{item.0 + 1}}={{item.1}}:2888:3888
      with_indexed_items: "{{ groups.node }}"

    - name: create zookeeper MyId file
      become_user: kafka
      shell:
        mkdir -p /tmp/zookeeper && echo {{seq}} > /tmp/zookeeper/myid
