#   tasks:
  - name: Install required system packages for Docker
    become: true
    package:
      name:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg-agent
        - software-properties-common
        - lsb-release
      state: latest

  - name: add Docker GPG apt key
    become: true
    apt_key:
      url: "{{ docker_gpg_url }}"
      state: present

  - name: add Docker Repository
    become: true
    apt_repository:
      repo: "{{ docker_repo }}"
      state: present

  - name: update apt and install docker-ce
    become: true
    package:
      name:
        - docker-ce
        - docker-ce-cli
        - containerd.io
      state: latest
      update_cache: true

  - name: install docker-compose
    become: true
    apt:
      name: docker-compose-plugin
      state: latest
      update_cache: true
      
  - name: add user to docker
    become: true
    user: name="{{ user }}" groups=docker append=true