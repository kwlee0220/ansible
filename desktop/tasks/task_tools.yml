
- name: 주요 모듈들 설치
  become: true
  package:
    name:
      - openssh-server
      - build-essential
      - ripgrep
      - tldr
      - htop
      - neofetch
      - net-tools
      - autojump
      - ffmpeg
      - trash-cli
      - bat
      - fd-find
    state: latest

- name: snap을 통한 설치
  become: true
  snap:
    name:
      - btop
      - cpufetch

- name: fzf 설치 - git clone
  git:
    repo: https://github.com/junegunn/fzf.git
    dest: ~/.fzf
    depth: 1
    clone: yes
- name: fzf 설치 - install
  shell: ~/.fzf/install

- name: gdu 설치
  become: true
  unarchive:
    src: https://github.com/dundee/gdu/releases/latest/download/gdu_linux_amd64.tgz
    dest: /usr/local/bin
    mode: 0755
    remote_src: true
