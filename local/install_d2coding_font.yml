---
- name: install chrome
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: font config 설치
      apt:
        name: fontconfig
        update_cache: true

    - name: 폰트 디렉토리 생성
      file: path=/usr/share/fonts/d2coding state=directory

    - name: D2Coding 1.3.2 다운로드 및 압축 풀기
      unarchive:
        src: "https://github.com/naver/d2codingfont/releases/download/VER1.3.2/D2Coding-Ver1.3.2-20180524.zip"
        dest: /usr/share/fonts/d2coding
        remote_src: true

    - name: 폰트 캐시 갱신
      command: fc-cache -f -v