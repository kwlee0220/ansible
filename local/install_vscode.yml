---
  - name: install VSCode
    hosts: localhost
    connection: local
    become: true

    tasks:
      - name: install dependents tools
        apt: 
          pkg:
            - software-properties-common
            - apt-transport-https
            - wget
          state: present

      - name: add MS GPG public key
        shell: wget -q https://packages.microsoft.com/keys/microsoft.asc -O- | sudo apt-key add -

      - name: register MS repository
        shell:  add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/repos/vscode stable main"

      - name: install VSCode 
        apt: name=code state=latest update_cache=true