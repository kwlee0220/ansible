---
- name: Docker Installation
  hosts: all
  vars:
    - ubuntu_version: focal
    - docker_gpg_url: https://download.docker.com/linux/ubuntu/gpg
    - docker_repo: "deb https://download.docker.com/linux/ubuntu {{ ubuntu_version }} stable"

  tasks:
    - name: Install required system packages
      apt:
        pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
          - virtualenv
          - python3-setuptools
        state: latest
        update_cache: true

    - name: add Docker GPG apt key
      apt_key:
        url: "{{ docker_gpg_url }}"
        state: present

    - name: add Docker Repository
      apt_repository:
        repo: {{ docker_repo }}
        state: present

    - name: update apt and install docker-ce
      apt:
        name: docker-ce
        state: latest
        update_cache: true

    - name: install Docker Module for Python
      pip:
        name: docker
