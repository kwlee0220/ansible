---
- name: install GNOME Terminal
  become: true
  package: name=gnome-terminal

- name: Set dconf values
  include_role:
    name: dconf_set_value
  vars:
    dconf_key: "{{ item.key }}"
    dconf_value: "{{ item.value }}"
  with_items: "{{ gnome_terminal_confs }}"

